<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caro AI Mobile</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #e74c3c; 
            --success: #27ae60; 
            --cell-size: 6.5vw; /* Kích thước ô dựa trên chiều rộng màn hình */
            --max-cell-size: 35px; 
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f8f9fa; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            touch-action: manipulation; /* Tối ưu hóa phản hồi chạm */
        }

        /* Màn hình setup */
        #setup-screen { 
            width: 90%; max-width: 400px; 
            background: white; padding: 20px; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            margin-top: 20vh; text-align: center; 
        }
        input, select { 
            width: 80%; padding: 12px; margin: 10px 0; 
            border: 2px solid #eee; border-radius: 10px; font-size: 16px; 
        }

        /* Màn hình Game */
        #game-screen { display: none; width: 100%; text-align: center; }
        
        .info-bar { 
            background: var(--primary); color: white; 
            padding: 15px 5px; font-size: 14px; font-weight: bold;
            position: sticky; top: 0; z-index: 10;
        }

        #board { 
            display: grid; 
            grid-template-columns: repeat(15, 1fr); 
            gap: 1px; background: #bdc3c7; 
            margin: 15px auto; 
            width: 96vw; /* Gần như chiếm trọn bề ngang điện thoại */
            max-width: 525px; /* Giới hạn trên máy tính */
            border: 2px solid #7f8c8d;
            touch-action: none; /* Ngăn cuộn trang khi đang chạm vào bàn cờ */
        }

        .cell { 
            aspect-ratio: 1 / 1; /* Giữ ô luôn vuông */
            background: white; display: flex; 
            align-items: center; justify-content: center; 
            font-weight: bold; font-size: calc(var(--cell-size) * 0.7); 
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Xóa màu highlight khi chạm trên iOS/Android */
        }

        /* Điều chỉnh font size cho máy tính */
        @media (min-width: 600px) {
            .cell { font-size: 22px; }
        }

        .cell.x { color: var(--accent); }
        .cell.o { color: #2980b9; }
        .last-move { background: #fff9c4 !important; }

        #status { margin: 10px 0; font-size: 18px; color: var(--primary); font-weight: bold; }
        
        .btn { 
            padding: 12px 30px; background: var(--success); 
            color: white; border: none; border-radius: 50px; 
            font-size: 16px; font-weight: bold; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2 style="margin-top:0">🎮 Caro Mobile AI</h2>
    <input type="text" id="playerName" placeholder="Tên của bạn..." maxlength="12">
    <select id="difficulty">
        <option value="easy">Mức: Dễ</option>
        <option value="medium" selected>Mức: Trung bình</option>
        <option value="hard">Mức: Khó</option>
    </select>
    <button class="btn" style="width: 100%; margin-top: 15px;" onclick="startGame()">VÀO CHƠI NGAY</button>
</div>

<div id="game-screen">
    <div class="info-bar" id="displayNames">Caro AI</div>
    <div id="status">Đang đợi...</div>
    <div id="board"></div>
    <button class="btn" style="background: #95a5a6;" onclick="location.reload()">LÀM MỚI / THOÁT</button>
</div>

<script>
const SIZE = 15;
let board = Array(SIZE * SIZE).fill("");
let gameOver = false;
let playerName = "Bạn";
let difficulty = "medium";
let lastMoveIndex = -1;

const SCORE = { WIN: 100000, LIVE_4: 10000, DEAD_4: 1000, LIVE_3: 500, DEAD_3: 100, LIVE_2: 50, DEAD_2: 10 };

function startGame() {
    const inputName = document.getElementById("playerName").value.trim();
    if (inputName) playerName = inputName;
    difficulty = document.getElementById("difficulty").value;
    
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    document.getElementById("displayNames").textContent = `⚔️ ${playerName} (X) vs 🤖 Máy (O)`;
    document.getElementById("status").textContent = "Mời bạn đánh!";
    
    createBoard();
}

function createBoard() {
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = "";
    for (let i = 0; i < SIZE * SIZE; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        // Sử dụng cả click và touchend để đảm bảo nhạy trên mọi thiết bị
        cell.addEventListener("click", (e) => {
            e.preventDefault();
            playerMove(i);
        });
        boardDiv.appendChild(cell);
    }
}

function playerMove(i) {
    if (board[i] !== "" || gameOver) return;
    
    makeMove(i, "X");
    if (checkWin(i, "X")) {
        endGame(`🎉 ${playerName} thắng!`);
        return;
    }

    document.getElementById("status").textContent = "🤖 Máy đang nghĩ...";
    setTimeout(aiMove, 200);
}

function makeMove(i, player) {
    board[i] = player;
    const cells = document.querySelectorAll(".cell");
    if (lastMoveIndex !== -1) cells[lastMoveIndex].classList.remove("last-move");
    
    cells[i].textContent = player;
    cells[i].classList.add(player.toLowerCase(), "last-move");
    lastMoveIndex = i;
}

function aiMove() {
    if (gameOver) return;
    
    let move;
    if (difficulty === "easy" && Math.random() < 0.3) {
        let candidates = getCandidates();
        move = candidates[Math.floor(Math.random() * candidates.length)];
    } else {
        move = findBestMove();
    }

    makeMove(move, "O");
    if (checkWin(move, "O")) {
        endGame("🤖 Máy thắng rồi!");
    } else {
        document.getElementById("status").textContent = "Đến lượt bạn";
    }
}

function findBestMove() {
    let bestScore = -Infinity;
    let move = -1;
    let candidates = getCandidates();
    let defenseWeight = difficulty === "easy" ? 0.3 : (difficulty === "hard" ? 1.5 : 0.8);

    for (let i of candidates) {
        let attackScore = evaluatePoint(i, "O");
        let defenseScore = evaluatePoint(i, "X");
        let totalScore = attackScore + (defenseScore * defenseWeight);
        if (totalScore > bestScore) {
            bestScore = totalScore;
            move = i;
        }
    }
    return move !== -1 ? move : Math.floor(SIZE * SIZE / 2);
}

function getCandidates() {
    let candidates = new Set();
    let hasPiece = false;
    for (let i = 0; i < board.length; i++) {
        if (board[i] !== "") {
            hasPiece = true;
            let r = Math.floor(i / SIZE), c = i % SIZE;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr * SIZE + nc] === "") {
                        candidates.add(nr * SIZE + nc);
                    }
                }
            }
        }
    }
    return hasPiece ? Array.from(candidates) : [Math.floor(SIZE * SIZE / 2)];
}

function evaluatePoint(index, player) {
    let total = 0;
    const r = Math.floor(index / SIZE), c = index % SIZE;
    const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
    for (let [dr, dc] of directions) {
        total += getLineScore(r, c, dr, dc, player);
    }
    return total;
}

function getLineScore(r, c, dr, dc, player) {
    let count = 1, block = 0;
    for (let side of [-1, 1]) {
        for (let i = 1; i < 5; i++) {
            let nr = r + dr * i * side, nc = c + dc * i * side;
            if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) { block++; break; }
            if (board[nr * SIZE + nc] === player) count++;
            else if (board[nr * SIZE + nc] === "") break;
            else { block++; break; }
        }
    }
    if (count >= 5) return SCORE.WIN;
    if (count === 4) return block === 0 ? SCORE.LIVE_4 : (block === 1 ? SCORE.DEAD_4 : 0);
    if (count === 3) return block === 0 ? SCORE.LIVE_3 : (block === 1 ? SCORE.DEAD_3 : 0);
    if (count === 2) return block === 0 ? SCORE.LIVE_2 : (block === 1 ? SCORE.DEAD_2 : 0);
    return count;
}

function checkWin(index, player) {
    const r = Math.floor(index / SIZE), c = index % SIZE;
    const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
    for (let [dr, dc] of directions) {
        let count = 1;
        for (let side of [-1, 1]) {
            for (let i = 1; i < 5; i++) {
                let nr = r + dr * i * side, nc = c + dc * i * side;
                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr * SIZE + nc] === player) count++;
                else break;
            }
        }
        if (count >= 5) return true;
    }
    return false;
}

function endGame(msg) {
    document.getElementById("status").textContent = msg;
    gameOver = true;
    setTimeout(() => alert(msg), 100);
}
</script>
</body>
</html>
