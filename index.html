<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cờ Caro AI Ultimate</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        
        /* Setup Screen */
        #setup-screen { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 50px; text-align: center; }
        input, select { padding: 10px; margin: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        
        /* Game Screen */
        #game-screen { display: none; text-align: center; width: 100%; }
        #board { 
            display: grid; gap: 1px; background: #bdc3c7; border: 3px solid #7f8c8d; 
            margin: 20px auto; width: fit-content; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .cell { 
            width: 32px; height: 32px; background: white; display: flex; 
            align-items: center; justify-content: center; font-weight: bold; 
            cursor: pointer; font-size: 20px; transition: 0.1s;
        }
        .cell:hover { background: #ecf0f1; }
        .cell.x { color: var(--accent); }
        .cell.o { color: #2980b9; }
        .last-move { background: #fff9c4 !important; }

        .info-bar { background: var(--primary); color: white; padding: 15px; width: 100%; box-sizing: border-box; }
        button { padding: 10px 25px; background: var(--success); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1>🎮 Cờ Caro AI</h1>
    <input type="text" id="playerName" placeholder="Nhập tên của bạn..." maxlength="15"><br>
    <label>Mức độ: </label>
    <select id="difficulty">
        <option value="easy">Dễ (Máy hơi ngáo)</option>
        <option value="medium" selected>Trung bình (Cân não)</option>
        <option value="hard">Khó (Bậc thầy phòng ngự)</option>
    </select><br>
    <button onclick="startGame()">Bắt đầu chơi</button>
</div>

<div id="game-screen">
    <div class="info-bar">
        <span id="displayNames">Người chơi vs Máy</span> | 
        <span id="status">Lượt của bạn</span>
    </div>
    <div id="board"></div>
    <button onclick="location.reload()">Thoát / Chơi lại</button>
</div>

<script>
const SIZE = 15;
let board = Array(SIZE * SIZE).fill("");
let gameOver = false;
let playerName = "Bạn";
let difficulty = "medium";
let lastMoveIndex = -1;

const SCORE = { WIN: 100000, LIVE_4: 10000, DEAD_4: 1000, LIVE_3: 500, DEAD_3: 100, LIVE_2: 50, DEAD_2: 10 };

function startGame() {
    const inputName = document.getElementById("playerName").value.trim();
    if (inputName) playerName = inputName;
    difficulty = document.getElementById("difficulty").value;
    
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    document.getElementById("displayNames").textContent = `${playerName} (X) vs 🤖 Máy (O)`;
    
    createBoard();
}

function createBoard() {
    const boardDiv = document.getElementById("board");
    boardDiv.style.gridTemplateColumns = `repeat(${SIZE}, 32px)`;
    for (let i = 0; i < SIZE * SIZE; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.addEventListener("click", () => playerMove(i));
        boardDiv.appendChild(cell);
    }
}

function playerMove(i) {
    if (board[i] !== "" || gameOver) return;
    
    makeMove(i, "X");
    if (checkWin(i, "X")) {
        endGame(`🎉 Chúc mừng ${playerName} đã thắng!`);
        return;
    }

    document.getElementById("status").textContent = "🤖 Máy đang tính...";
    setTimeout(aiMove, 300);
}

function makeMove(i, player) {
    board[i] = player;
    const cells = document.querySelectorAll(".cell");
    if (lastMoveIndex !== -1) cells[lastMoveIndex].classList.remove("last-move");
    
    cells[i].textContent = player;
    cells[i].classList.add(player.toLowerCase(), "last-move");
    lastMoveIndex = i;
}

function aiMove() {
    if (gameOver) return;
    
    let move;
    // Mức dễ: 30% đánh ngẫu nhiên vào ô trống bất kỳ xung quanh
    if (difficulty === "easy" && Math.random() < 0.3) {
        let candidates = getCandidates();
        move = candidates[Math.floor(Math.random() * candidates.length)];
    } else {
        move = findBestMove();
    }

    makeMove(move, "O");
    if (checkWin(move, "O")) {
        endGame("🤖 Máy thắng rồi! Gà quá!");
    } else {
        document.getElementById("status").textContent = `Lượt của ${playerName}`;
    }
}

function findBestMove() {
    let bestScore = -Infinity;
    let move = -1;
    let candidates = getCandidates();

    // Hệ số phòng ngự thay đổi theo độ khó
    let defenseWeight = 0.8; // Medium
    if (difficulty === "easy") defenseWeight = 0.3;
    if (difficulty === "hard") defenseWeight = 1.5;

    for (let i of candidates) {
        let attackScore = evaluatePoint(i, "O");
        let defenseScore = evaluatePoint(i, "X");
        
        let totalScore = attackScore + (defenseScore * defenseWeight);

        if (totalScore > bestScore) {
            bestScore = totalScore;
            move = i;
        }
    }
    return move !== -1 ? move : Math.floor(SIZE * SIZE / 2);
}

function getCandidates() {
    let candidates = new Set();
    let hasPiece = false;
    for (let i = 0; i < board.length; i++) {
        if (board[i] !== "") {
            hasPiece = true;
            let r = Math.floor(i / SIZE), c = i % SIZE;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr * SIZE + nc] === "") {
                        candidates.add(nr * SIZE + nc);
                    }
                }
            }
        }
    }
    return hasPiece ? Array.from(candidates) : [Math.floor(SIZE * SIZE / 2)];
}

function evaluatePoint(index, player) {
    let total = 0;
    const r = Math.floor(index / SIZE), c = index % SIZE;
    const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
    for (let [dr, dc] of directions) {
        total += getLineScore(r, c, dr, dc, player);
    }
    return total;
}

function getLineScore(r, c, dr, dc, player) {
    let count = 1, block = 0;
    for (let side of [-1, 1]) {
        for (let i = 1; i < 5; i++) {
            let nr = r + dr * i * side, nc = c + dc * i * side;
            if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) { block++; break; }
            if (board[nr * SIZE + nc] === player) count++;
            else if (board[nr * SIZE + nc] === "") break;
            else { block++; break; }
        }
    }
    if (count >= 5) return SCORE.WIN;
    if (count === 4) return block === 0 ? SCORE.LIVE_4 : (block === 1 ? SCORE.DEAD_4 : 0);
    if (count === 3) return block === 0 ? SCORE.LIVE_3 : (block === 1 ? SCORE.DEAD_3 : 0);
    if (count === 2) return block === 0 ? SCORE.LIVE_2 : (block === 1 ? SCORE.DEAD_2 : 0);
    return count;
}

function checkWin(index, player) {
    const r = Math.floor(index / SIZE), c = index % SIZE;
    const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
    for (let [dr, dc] of directions) {
        let count = 1;
        for (let side of [-1, 1]) {
            for (let i = 1; i < 5; i++) {
                let nr = r + dr * i * side, nc = c + dc * i * side;
                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr * SIZE + nc] === player) count++;
                else break;
            }
        }
        if (count >= 5) return true;
    }
    return false;
}

function endGame(msg) {
    document.getElementById("status").textContent = msg;
    gameOver = true;
    alert(msg);
}
</script>
</body>
</html>
